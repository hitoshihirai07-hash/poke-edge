  var light={'--bg':'#e8f4f8','--bg2':'#d0e8f0','--panel':'#f4fbff','--border':'#90c8e0','--border2':'#60a8cc','--accent':'#0066aa','--accent2':'#cc1040','--accent3':'#cc7700','--green':'#007744','--text':'#051828','--text2':'#2a5070','--text3':'#0a3050'};

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--bg2:#0b0e1a;--panel:#0f1423;--border:#1a2540;--border2:#243356;--accent:#00c8f0;--accent2:#ff3060;--accent3:#ffc800;--green:#00e676;--text:#d8e8ff;--text2:#4a6080;--text3:#7a90b0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 50% 35% at 10% 5%,rgba(0,200,240,0.06) 0%,transparent 60%),linear-gradient(rgba(0,200,240,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,240,0.018) 1px,transparent 1px);background-size:auto,52px 52px,52px 52px;}
header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;padding:0 20px;display:flex;align-items:center;gap:14px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:6px;color:var(--accent);cursor:pointer;flex-shrink:0;}
.logo em{color:var(--accent2);font-style:normal;}
.header-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;}
.header-sub{font-size:10px;color:var(--text2);letter-spacing:2px;flex-shrink:0;}
.header-nav{display:flex;gap:3px;margin-left:auto;flex-wrap:nowrap;overflow-x:auto;}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:4px 10px;font-family:'Noto Sans JP',sans-serif;font-size:11px;transition:all 0.18s;text-decoration:none;display:inline-block;white-space:nowrap;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,240,0.07);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;margin-left:auto;background:none;border:none;}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);transition:all 0.3s;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:98;}
.nav-overlay.show{display:block;}
@media(max-width:768px){
  .header-nav{display:none;position:fixed;top:52px;right:0;width:220px;height:calc(100vh - 52px);background:rgba(7,9,15,0.98);border-left:1px solid var(--border);flex-direction:column;gap:0;padding:12px 0;z-index:99;overflow-y:auto;backdrop-filter:blur(20px);}
  .header-nav.open{display:flex;}
  .nav-btn{padding:14px 22px;font-size:13px;border:none;border-bottom:1px solid var(--border);width:100%;text-align:left;}
  .nav-btn.active{background:rgba(0,200,240,0.08);border-left:3px solid var(--accent);}
  .hamburger{display:flex;}
}
.main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px 16px;}

/* フィルターバー */
.filter-bar{background:var(--panel);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:9px;color:var(--text2);letter-spacing:2px;flex-shrink:0;}
.season-btns{display:flex;gap:5px;flex-wrap:wrap;}
.season-btn{padding:4px 12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s;}
.season-btn:hover,.season-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,240,0.08);}
.search-input{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:5px 10px;font-family:'Noto Sans JP',sans-serif;font-size:12px;outline:none;min-width:160px;flex:1;}
.search-input:focus{border-color:var(--accent);}

/* 統計バー */
.stats-bar{display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
.stat-item{font-size:11px;color:var(--text2);}
.stat-item b{color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:18px;margin-right:2px;}

/* テーブル */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--bg2);color:var(--text2);padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);font-weight:400;letter-spacing:1px;font-size:10px;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--accent);}
thead th.sort-asc::after{content:' ▲';color:var(--accent);font-size:9px;}
thead th.sort-desc::after{content:' ▼';color:var(--accent);font-size:9px;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:hover{background:var(--bg2);}
tbody tr.is-nintei{background:rgba(255,200,0,0.04);}
tbody tr.is-nintei:hover{background:rgba(255,200,0,0.08);}
td{padding:7px 10px;white-space:nowrap;}
.td-no{font-family:'JetBrains Mono',monospace;color:var(--text2);font-size:10px;}
.td-name{font-weight:700;}
.td-stat{font-family:'JetBrains Mono',monospace;text-align:right;}
.td-total{font-family:'JetBrains Mono',monospace;text-align:right;font-weight:700;color:var(--accent3);}
.td-badge{text-align:center;}
.badge-ok{font-size:9px;font-weight:700;padding:1px 6px;background:rgba(255,200,0,0.15);color:var(--accent3);border:1px solid var(--accent3);}
/* stat bar */
.stat-bar-wrap{display:flex;align-items:center;gap:4px;}
.stat-bar-bg{width:60px;height:4px;background:var(--bg);border-radius:2px;flex-shrink:0;}
.stat-bar-fg{height:100%;border-radius:2px;}
/* type pills */
.tp{display:inline-block;padding:1px 5px;font-size:8px;font-weight:700;margin-right:2px;}
.tp-ノーマル{background:#546e7a;color:#fff;}.tp-ほのお{background:#c62828;color:#fff;}.tp-みず{background:#1565c0;color:#fff;}
.tp-でんき{background:#f9a825;color:#000;}.tp-くさ{background:#2e7d32;color:#fff;}.tp-こおり{background:#00838f;color:#fff;}
.tp-かくとう{background:#b71c1c;color:#fff;}.tp-どく{background:#6a1b9a;color:#fff;}.tp-じめん{background:#6d4c41;color:#fff;}
.tp-ひこう{background:#0277bd;color:#fff;}.tp-エスパー{background:#ad1457;color:#fff;}.tp-むし{background:#558b2f;color:#fff;}
.tp-いわ{background:#4e342e;color:#fff;}.tp-ゴースト{background:#4a148c;color:#fff;}.tp-ドラゴン{background:#4527a0;color:#fff;}
.tp-あく{background:#212121;color:#fff;}.tp-はがね{background:#455a64;color:#fff;}.tp-フェアリー{background:#880e4f;color:#fff;}
.empty{text-align:center;padding:60px;color:var(--text2);font-size:13px;}
footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:18px 20px;margin-top:36px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--text2);letter-spacing:4px;}

/* ===== ライトモード ===== */
</style>
</head>

      <tbody id="poke-tbody"></tbody>
    </table>
  </div>
</div>

<footer>
  <div class="footer-logo">PokeEdge</div>
  <div style="font-size:10px;"><a href="policy.html" style="color:var(--text2);text-decoration:none;">プライバシーポリシー / お問い合わせ</a></div>
</footer>

function sortBy(key) {

    }
  });
  render();
}

      return `<td class="td-stat">
        <div class="stat-bar-wrap">
          <span style="min-width:28px;text-align:right;">${val}</span>
          <div class="stat-bar-bg"><div class="stat-bar-fg" style="width:${pct}%;background:${color};"></div></div>
        </div>
      </td>`;
    }

    return `<tr class="${nintei?'is-nintei':''}">
      <td class="td-no">#${String(p.no||'').padStart(4,'0')}</td>
      <td class="td-name">${p.name}</td>
      <td>${t1}${t2}</td>
      ${statCell('hp')}
      ${statCell('atk')}
      ${statCell('def')}
      ${statCell('spa')}
      ${statCell('spd')}
      ${statCell('spe')}
      <td class="td-total">${p.total}</td>
      <td class="td-badge">${badge}</td>
    </tr>`;
  }).join('');

  document.getElementById('poke-tbody').innerHTML = rows;
}

function buildSeasonBtns() {
  const container = document.getElementById('season-btns');
  SEASON_DATA.seasons.forEach(s => {
    const count = (SEASON_DATA[s]||[]).length;
    const btn = document.createElement('button');
    btn.className = 'season-btn';
    btn.dataset.season = s;
    btn.textContent = `${s}（${count}件）`;
    btn.onclick = () => setSeason(btn, s);
    container.appendChild(btn);
  });
}

// 初期ソートクラスをNoに設定
document.querySelector('thead th').classList.add('sort-asc');

window.onload = async () => {
  await initAuth();
  buildSeasonBtns();
  render();
};
</script>

<script>


// ===== テーマ切替 =====
var THEMES = {dark:{"--bg":"#07090f","--bg2":"#0b0e1a","--panel":"#0f1423","--border":"#1a2540","--border2":"#243356","--accent":"#00c8f0","--accent2":"#ff3060","--accent3":"#ffc800","--green":"#00e676","--text":"#d8e8ff","--text2":"#4a6080","--text3":"#7a90b0"},light:{"--bg":"#e8f4f8","--bg2":"#d0e8f0","--panel":"#f4fbff","--border":"#90c8e0","--border2":"#60a8cc","--accent":"#0066aa","--accent2":"#cc1040","--accent3":"#cc7700","--green":"#007744","--text":"#051828","--text2":"#2a5070","--text3":"#0a3050"}};
function applyTheme(theme) {
  var vars = THEMES[theme] || THEMES.dark;
  var root = document.documentElement.style;
  for(var k in vars) root.setProperty(k, vars[k]);
  localStorage.setItem('pokeedge_theme', theme);
  var btn = document.getElementById('theme-btn');
  if(btn) btn.textContent = theme === 'light' ? '🌙' : '☀️';
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme() {
  var current = localStorage.getItem('pokeedge_theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}
// 即時適用
(function(){
  var t = localStorage.getItem('pokeedge_theme') || 'dark';
  var vars = THEMES[t] || THEMES.dark;
  var root = document.documentElement.style;
  for(var k in vars) root.setProperty(k, vars[k]);
  document.documentElement.setAttribute('data-theme', t);
})();


function toggleNav(){const nav=document.querySelector('.header-nav');const hb=document.getElementById('hamburger');const ov=document.getElementById('nav-overlay');if(!nav)return;nav.classList.toggle('open');hb.classList.toggle('open');ov.classList.toggle('show');}
function closeNav(){const nav=document.querySelector('.header-nav');const hb=document.getElementById('hamburger');const ov=document.getElementById('nav-overlay');if(!nav)return;nav.classList.remove('open');hb.classList.remove('open');ov.classList.remove('show');}
document.addEventListener('DOMContentLoaded',function(){
  const hb=document.getElementById('hamburger');const ov=document.getElementById('nav-overlay');
  if(hb)hb.addEventListener('click',toggleNav);if(ov)ov.addEventListener('click',closeNav);
  document.querySelectorAll('.nav-btn').forEach(function(btn){btn.addEventListener('click',function(){if(window.innerWidth<=768)closeNav();});});
});
</script>
